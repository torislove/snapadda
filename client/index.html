<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- Core SEO -->
    <title>SnapAdda — Plots, Apartments, Villas & Agriculture Land in Andhra Pradesh</title>
    <meta name="description" content="Buy verified plots, CRDA approved apartments, luxury villas, houses in Amaravati, Vijayawada, Guntur, Mangalagiri, Tenali. Agriculture land across all 26 AP districts. 100% genuine listings." />
    <meta name="keywords" content="Amaravati plots, Vijayawada apartments, Guntur real estate, Mangalagiri properties, Tenali land, AP agriculture land, CRDA approved, RERA, VMRDA, Vastu compliant, SnapAdda, Andhra Pradesh real estate, buy plots AP, villas Amaravati, houses Guntur, farmland AP" />
    <meta name="author" content="SnapAdda Real Estate" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://snapadda.com/" />

    <!-- Open Graph for Facebook, WhatsApp & LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="SnapAdda — Best Property Platform in Andhra Pradesh" />
    <meta property="og:description" content="Explore CRDA, RERA & VMRDA approved plots, luxury apartments, villas and agriculture lands across Amaravati, Vijayawada, Guntur & all AP districts." />
    <meta property="og:image" content="https://snapadda.com/og-image.png" />
    <meta property="og:url" content="https://snapadda.com" />
    <meta property="og:site_name" content="SnapAdda Real Estate" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SnapAdda | Amaravati & AP Real Estate" />
    <meta name="twitter:description" content="Verified plots, apartments, villas & agriculture land across all Andhra Pradesh districts." />
    <meta name="twitter:image" content="https://snapadda.com/og-image.png" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#111111" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Structured Data — Real Estate Agent -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "RealEstateAgent",
      "name": "SnapAdda",
      "url": "https://snapadda.com",
      "logo": "https://snapadda.com/favicon.svg",
      "description": "Premium real estate platform for Andhra Pradesh — plots, apartments, villas, houses and agriculture land across all districts.",
      "areaServed": {
        "@type": "State",
        "name": "Andhra Pradesh",
        "containedInPlace": { "@type": "Country", "name": "India" }
      },
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Amaravati",
        "addressRegion": "Andhra Pradesh",
        "addressCountry": "IN"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "sales",
        "availableLanguage": ["English", "Telugu"]
      },
      "sameAs": []
    }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
