<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- ANTI-CACHE HEADERS -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <!-- Core SEO -->
    <title>SnapAdda</title>
    <meta name="description" content="SnapAdda connects buyers with verified plots, apartments, villas, houses and agriculture land across Amaravati, Vijayawada, Guntur, Mangalagiri, Tenali and all Andhra Pradesh districts." />
    <meta name="keywords" content="SnapAdda, Andhra Pradesh real estate, Amaravati plots, Vijayawada apartments, Guntur villas, Mangalagiri land, Tenali properties, agriculture land AP, CRDA approved homes, RERA real estate" />
    <meta name="author" content="SnapAdda Real Estate" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://snapadda.com/" />

    <!-- Open Graph for Facebook, WhatsApp & LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="SnapAdda — Best Property Platform in Andhra Pradesh" />
    <meta property="og:description" content="Explore CRDA, RERA & VMRDA approved plots, luxury apartments, villas and agriculture lands across Amaravati, Vijayawada, Guntur & all AP districts." />
    <meta property="og:image" content="https://snapadda.com/favicon.svg" />
    <meta property="og:image:alt" content="SnapAdda logo and real estate marketplace" />
    <meta property="og:url" content="https://snapadda.com" />
    <meta property="og:site_name" content="SnapAdda Real Estate" />
    <meta property="og:locale" content="en_IN" />

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SnapAdda | Andhra Pradesh Real Estate" />
    <meta name="twitter:description" content="Verified plots, apartments, villas, houses and agriculture land across all AP districts. Find the right property with SnapAdda." />
    <meta name="twitter:image" content="https://snapadda.com/favicon.svg" />
    <meta name="twitter:image:alt" content="SnapAdda logo and property search" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#111111" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Structured Data — Real Estate Agent -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "RealEstateAgent",
      "name": "SnapAdda—Plots, Apartments & Villas",
      "short_name": "SnapAdda",
      "description": "Verified plots, apartments & villas in Andhra Pradesh.",
      "url": "https://snapadda.com",
      "logo": "https://snapadda.com/logo.svg",
      "areaServed": {
        "@type": "State",
        "name": "Andhra Pradesh",
        "containedInPlace": { "@type": "Country", "name": "India" }
      },
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Amaravati",
        "addressRegion": "Andhra Pradesh",
        "addressCountry": "IN"
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "sales",
        "availableLanguage": ["English", "Telugu"]
      },
      "sameAs": []
    }
    </script>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600;700&family=Great+Vibes&family=MonteCarlo&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      import { injectIntoGlobalHook } from "/@react-refresh";
      injectIntoGlobalHook(window);
      window.$RefreshReg$ = () => {};
      window.$RefreshSig$ = () => (type) => type;
      window.__vite_plugin_react_preamble_installed__ = true;
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
